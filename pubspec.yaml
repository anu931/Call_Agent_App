name: crm_app
description: "CRM App with automatic call recording and log management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Permissions
  permission_handler: ^11.3.1

  # Database (sqflite kept for flutter-side use if needed)
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Audio playback for recordings
  just_audio: ^0.9.40

  # Date formatting
  intl: ^0.19.0

  # HTTP (kept from original)
  http: ^1.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
